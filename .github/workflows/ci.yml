name: CI

# Run on every push to main, and on every pull request as it opens, gets new
# commits, or is reopened. A reopened PR is validated again because its state
# matters again. ready_for_review is left out on purpose: CI runs on draft PRs
# too, so marking one ready adds no new work.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege. The workflow only reads the code. It needs no token scope and
# no secrets.
permissions:
  contents: read

# Cancel an older run on the same branch or PR when a newer one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build with each compiler and run the whole suite, minus the timing test (see
  # the perf job). This includes the consume test, which builds the three
  # consumption paths and checks the exported symbols.
  test:
    name: test (${{ matrix.cc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - {cc: gcc, cxx: g++}
          - {cc: clang, cxx: clang++}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j "$(nproc)"
      - name: Test
        run: ctest --test-dir build -E test_perf --output-on-failure

  # Address plus undefined, and thread, in separate jobs. They cannot share a
  # build. The consume test is skipped: it builds its own copies of the library
  # that are not instrumented. The perf test is skipped too: a sanitized build is
  # slow and its absolute bounds are already off under a sanitizer.
  sanitizers:
    name: sanitizers (${{ matrix.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: asan-ubsan, flags: "address,undefined"}
          - {name: tsan, flags: "thread"}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Configure
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -DSLOG_SANITIZER=${{ matrix.flags }} -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build -j "$(nproc)"
      - name: Test
        run: ctest --test-dir build -E "consume|test_perf" --output-on-failure

  # Build every example and run it, then run the three consumption example
  # scripts. These are the programs a user copies from, so they must work.
  examples:
    name: examples
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Configure and build
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j "$(nproc)"
      - name: Run the example programs
        run: |
          work="$(mktemp -d)"
          cd "$work"
          for ex in quickstart modules stdout_control files tags custom_levels \
                    custom_prefix multithread multiprocess config_demo; do
            "$GITHUB_WORKSPACE/build/examples/$ex" >/dev/null
            rm -rf logs
          done
          echo "all example programs ran"
      - name: Run the consumption example scripts
        run: |
          for path in copied_sources third_party prebuilt; do
            ( cd "examples/consume/$path" && bash build.sh >/dev/null )
            echo "examples/consume/$path ran"
          done

  # The suite has a timing test with absolute bounds. A shared runner is noisy,
  # so this job runs it for the numbers only and never fails the build.
  perf:
    name: perf (informational)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Configure and build
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j "$(nproc)"
      - name: Run the timing test
        run: ctest --test-dir build -R test_perf --output-on-failure

  # One gate the branch protection can require. It passes only if every job that
  # matters passed, so the matrix can grow or shrink without touching the rule.
  ci:
    name: ci
    runs-on: ubuntu-24.04
    needs: [test, sanitizers, examples]
    if: always()
    steps:
      - name: Check the required jobs
        run: |
          results="${{ needs.test.result }} ${{ needs.sanitizers.result }}"
          results="$results ${{ needs.examples.result }}"
          echo "results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "a required job did not succeed"
              exit 1
            fi
          done
          echo "all required jobs passed"
