# slog config file. INI style: one "key = value" per line. A '#' starts a
# comment, at the start of a line or after a space. slog loads the file named by
# SLOG_CONFIG, or ./simplelog.conf if it exists, at the first log call. Env vars
# override the file, and code API calls override both.
#
# Every key is optional. The value shown is a reasonable setting, not always the
# default; the default is noted in the comment. Levels are error, warning, info,
# debug, any custom name, or a plain integer. off/on/inherit are accepted where
# they make sense.

# ---- levels ----------------------------------------------------------------
verbosity   = warning     # global default level (default: warning)
module.net  = debug       # one module's level; repeat the line per module
module.db   = info

# ---- where files go --------------------------------------------------------
dir         = ./logs      # log directory (default: ./logs)
tag         =             # run tag, groups a run under latest/<tag> (default: none)

# ---- the file output -------------------------------------------------------
file            = on      # on, off, or a level (default: on, following the level above)
file.per_module = false   # one file per module instead of one per run (default: false)
# file.name     = app.log # fixed file name (default: <pid>-<timestamp>.log)

# ---- the stdout output -----------------------------------------------------
stdout          = warning # off, or a level for the console (default: on, inherited)
stdout.only     = false   # true = show exactly the stdout level, not "and lower"
stdout.modules  =         # comma list to limit stdout to some modules (default: all)

# ---- the line prefix -------------------------------------------------------
format      = [%L][%f]: %m  # prefix pattern (default: [%L][%f]: %m)
time        = off           # prepend the %t time field (default: off)
elapsed     = off           # prepend the %e elapsed-seconds field (default: off)
color       = auto          # auto, always, or never (default: auto)

# ---- flush and retention ---------------------------------------------------
flush        = warning    # flush on this level and more severe (default: warning)
retain.runs  = 0          # keep only the newest N runs, 0 keeps all (default: 0)
retain.days  = 0          # drop runs older than N days, 0 for no limit (default: 0)
